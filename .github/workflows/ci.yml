name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.75", "stable"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Configure git identity for integration tests
        run: |
          git config --global user.email "ci@repodesk.test"
          git config --global user.name "Repodesk CI"

      - name: cargo test
        run: cargo test --workspace --all-features

  build-release:
    name: Release Build
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.75 (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"

      - name: cargo build --release
        run: cargo build --release --bin repodesk

      - name: Verify binary exists
        run: |
          ls -lh target/release/repodesk
          file target/release/repodesk

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck entrypoint.sh
        run: shellcheck entrypoint.sh
